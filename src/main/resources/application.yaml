spring:
  application:
    name: skill-bridge

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/skillbridge_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:5}
      minimum-idle: ${HIKARI_MIN_IDLE:1}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mailersend:
  api:
    token: ${MAILERSEND_API_TOKEN}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile

logging:
  level:
    com.skillbridge: INFO
    org.springframework.security: INFO

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-at-least-32-characters-long}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:8080}
  admin:
    default-email: ${ADMIN_EMAIL:admin@upsa.edu.gh}
    default-password: ${ADMIN_PASSWORD:Admin@123!}

cloudinary:
