spring:
  application:
    name: skill-bridge

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/skillbridge_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:57241fd50c71a4}
    password: ${MAIL_PASSWORD:3069f80be9c9e3}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:805427396737-qbmlu9f01q677l0aopk3e4ehqgqavheh.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            scope: email, profile

logging:
  level:
    com.skillbridge: DEBUG
    org.springframework.security: DEBUG

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-at-least-32-characters-long}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:8080}
  admin:
    default-email: ${ADMIN_EMAIL:admin@upsa.edu.gh}
    default-password: ${ADMIN_PASSWORD:Admin@123!}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dg7blc70v}
  api-key: ${CLOUDINARY_API_KEY:561627481928474}
  api-secret: ${CLOUDINARY_API_SECRET:IYNA7394XBpIMrQMYTF2Ny_ueSU}
